<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro de Personas</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- Import map (ready if later you add ESM libs) -->
  <script type="importmap">
  {
    "imports": {
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div class="banner" role="banner">
      <div class="banner-title">REGISTRO DE PUBLICADORES - CONGREGACIÓN OESTE</div>
      <div class="banner-controls" style="position:relative;">
      <div style="position:relative;">
        <button id="backupBtn" class="icon-btn" aria-haspopup="true" aria-expanded="false" title="Respaldo">Respaldo ▾</button>

        <!-- simple dropdown menu for backup actions -->
        <div id="backupMenu" class="hidden" role="menu" aria-label="Respaldo" style="position:absolute; right:0; top:calc(100% + 8px); background:#fff; border:1px solid #e6e9ee; border-radius:8px; box-shadow:0 8px 24px rgba(10,12,15,0.12); padding:8px; z-index:1000; min-width:160px;">
          <button id="exportBtn" title="Exportar registro" class="icon-btn" style="display:block; width:100%; text-align:left; padding:8px 10px;">Exportar</button>
          <button id="importBtn" title="Importar registro" class="icon-btn" style="display:block; width:100%; text-align:left; padding:8px 10px;">Importar</button>
        </div>
      </div>
      <input id="importFile" type="file" accept=".json" class="hidden" />
    </div>
    </div>
    <div class="toolbar">
      <button id="addPersonBtn" class="primary">Agregar Persona</button>
      <button id="registroBtn" class="secondary">Registro</button>
      <button id="actividadBtn" class="secondary">Actividad</button>
      <div class="spacer"></div>

      <input id="search" placeholder="Buscar..." aria-label="Buscar" />
      <button id="clearSearchBtn" class="trash-btn" title="Borrar búsqueda" aria-label="Borrar búsqueda">✖</button>
    </div>

    <!-- Options bar: shows contextual options depending on active button (currently empty) -->
    <div class="options-bar" role="toolbar" aria-label="Barra de opciones"></div>

    <div class="table-wrapper" role="region" aria-label="Tabla de registro">
      <table id="peopleTable" class="grid">
        <colgroup id="cols">
          <col style="width:160px" />
          <col style="width:140px" />
          <col style="width:160px" />
          <col style="width:140px" />
          <col style="width:100px" />
          <col style="width:110px" />
          <col style="width:140px" />
          <col style="width:64px" />
          <col style="width:64px" />
          <col style="width:120px" />
          <col style="width:120px" />
          <col style="width:220px" />
          <col style="width:120px" />
          <col style="width:180px" />
        </colgroup>
        <thead>
          <tr>
            <th>Nombre (Cong.)</th>
            <th>Nombre</th>
            <th>Apellido Paterno</th>
            <th>Apellido Materno</th>
            <th>Grupo</th>
            <th>Privilegio</th>
            <th>Designación</th>
            <th>Sexo</th>
            <th>Esp</th>
            <th>Fecha Nacimiento</th>
            <th>Fecha Bautismo</th>
            <th>Dirección</th>
            <th>Teléfono</th>
            <th>Contacto Emergencia</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal/Form -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <header class="modal-header">
        <h3 id="modalTitle">Agregar Persona</h3>
        <button id="closeModal" class="icon-btn" aria-label="Cerrar">&times;</button>
      </header>
      <form id="personForm" autocomplete="off">
        <input type="hidden" id="personId" />
        <div class="form-row">
          <label>Nombre (Cong.)<input id="congName" name="congName" /></label>
          <label>Nombre<input id="firstName" name="firstName" required /></label>
        </div>
        <div class="form-row">
          <label>Apellido Paterno<input id="lastNameP" name="lastNameP" required /></label>
          <label>Apellido Materno<input id="lastNameM" name="lastNameM" /></label>
        </div>
        <div class="form-row">
          <label>Grupo<input id="group" name="group" /></label>
          <label>Privilegio
            <select id="privilege" name="privilege">
              <option value="">-</option>
              <option value="Publicador">Publicador</option>
              <option value="P. No Baut.">P. No Baut.</option>
              <option value="Anciano">Anciano</option>
              <option value="Siervo Ministerial">Siervo Ministerial</option>
              <option value="Inactivo">Inactivo</option>
            </select>
          </label>
        </div>
        <div class="form-row">
          <label>Designación
            <select id="designation" name="designation">
              <option value="">-</option>
              <option value="Precursor Regular">Precursor Regular</option>
              <option value="Precursor Auxiliar">Precursor Auxiliar</option>
              <option value="N/A">N/A</option>
            </select>
          </label>
          <label>Sexo
            <select id="sex" name="sex">
              <option value="">-</option>
              <option value="M">M</option>
              <option value="F">F</option>
              <option value="O">Otro</option>
            </select>
          </label>
        </div>
        <div class="form-row">
          <label>Esp
            <select id="esp" name="esp">
              <option value="">-</option>
              <option value="O.O.">O.O.</option>
              <option value="UNG">UNG</option>
            </select>
          </label>
          <label>Fecha Nacimiento<input id="birthDate" name="birthDate" type="date" /></label>
        </div>
        <div class="form-row">
          <label>Fecha Bautismo<input id="baptismDate" name="baptismDate" type="date" /></label>
        </div>
        <div class="form-row">
          <label class="full">Dirección<textarea id="address" name="address" rows="2"></textarea></label>
        </div>
        <div class="form-row">
          <label>Teléfono<input id="phone" name="phone" inputmode="tel" /></label>
          <label>Contacto Emergencia<input id="emergencyContact" name="emergencyContact" /></label>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancelBtn">Cancelar</button>
          <button type="submit" class="primary" id="saveBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
